<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LAB ENTRANCE｜翡翠高級版</title>
  <meta name="description" content="深綠色高級感入口頁面，採用 Glassmorphism 與微光動畫設計。" />
  <meta name="theme-color" content="#050a08" />
  <style>
    :root {
      /* 基礎背景：深苔蘚綠到極致黑 */
      --bg: #030806;
      --bg-2: #07120e;
      --panel: #0b1a15;
      --panel-2: #0f221c;
      --glass: rgba(255, 255, 255, .03);
      
      /* 文字：奶白色與橄欖灰 */
      --text: #f0f7f4;
      --muted: #8fa098;
      
      /* 線條：微弱的綠光 */
      --line: rgba(255, 255, 255, .06);
      --line-strong: rgba(110, 231, 183, .18);
      
      /* 品牌色：翡翠綠與薄荷綠 */
      --brand: #4ade80;       /* 翠綠色 */
      --brand-2: #10b981;     /* 翡翠綠 */
      --brand-3: #d1fae5;     /* 淺綠白 */
      
      /* 標籤按鈕 */
      --chip: #12261f;
      --chip-on: #065f46;
      --chip-on-text: #ffffff;
      
      --shadow: 0 22px 70px rgba(0, 0, 0, .6);
      --shadow-soft: 0 10px 28px rgba(0, 0, 0, .4);
      --radius: 18px;
      --radius-lg: 24px;
      --max: 1240px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    
    body {
      margin: 0;
      color: var(--text);
      font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", Arial, sans-serif;
      background:
        radial-gradient(900px 420px at 12% -4%, rgba(16, 185, 129, .08), transparent 62%),
        radial-gradient(980px 460px at 88% -8%, rgba(52, 211, 153, .06), transparent 64%),
        radial-gradient(700px 400px at 50% 120%, rgba(5, 150, 105, .05), transparent 68%),
        linear-gradient(180deg, #060d0a 0%, #030806 46%, #010504 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 15%, rgba(110, 231, 183, .015) 28%, transparent 38%),
        radial-gradient(1200px 120px at 50% 0%, rgba(255, 255, 255, .02), transparent 80%);
      mix-blend-mode: screen;
      opacity: .8;
    }

    a { color: inherit; text-decoration: none; }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 24px 18px 48px; }

    /* --- Hero Section --- */
    .hero {
      display: grid;
      gap: 18px;
      padding: 24px;
      border-radius: 28px;
      border: 1px solid rgba(110, 231, 183, .1);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .015)),
        linear-gradient(135deg, rgba(16, 185, 129, .04), transparent 40%, rgba(52, 211, 153, .03) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05), var(--shadow);
      backdrop-filter: blur(12px) saturate(110%);
      position: relative;
    }

    .hero-top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
    .brand { display: flex; gap: 14px; align-items: flex-start; }
    
    .logo {
      width: 48px; height: 48px; display: grid; place-items: center; flex: none;
      border-radius: 16px;
      background: linear-gradient(145deg, #fff, rgba(255,255,255,.2) 15%, #34d399 60%, #059669 100%);
      color: #030806;
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .5), 0 14px 28px rgba(0,0,0,.3);
      position: relative;
      overflow: hidden;
    }

    .title { margin: 0; font-size: clamp(28px, 5vw, 46px); line-height: 1.05; letter-spacing: .04em; color: #fff; }
    .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .top-badge {
      padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(110, 231, 183, .2);
      background: rgba(255,255,255,.03); color: #d1fae5; font-size: 12px; letter-spacing: .18em;
    }

    /* --- Toolbar --- */
    .toolbar { display: grid; gap: 12px; margin-top: 10px; }
    @media (min-width: 920px) { .toolbar { grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr); } }

    .search {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-radius: 999px; background: rgba(8, 15, 12, .8);
      border: 1px solid rgba(110, 231, 183, .1);
    }
    .search input { width: 100%; border: 0; outline: 0; background: transparent; color: var(--text); }
    .search svg { color: var(--brand); opacity: .7; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      appearance: none; border: 1px solid rgba(255,255,255,.06);
      background: var(--chip); color: #d1fae5;
      padding: 8px 16px; border-radius: 999px; cursor: pointer; transition: .2s;
    }
    .chip:hover { border-color: var(--brand); transform: translateY(-1px); }
    .chip[aria-pressed="true"] { background: var(--chip-on); border-color: var(--brand); color: #fff; }

    /* --- Grid & Cards --- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 24px; }

    .card {
      display: grid; grid-template-rows: auto 1fr auto;
      min-height: 340px; border-radius: 22px; overflow: hidden;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid rgba(110, 231, 183, .08);
      box-shadow: var(--shadow);
      transition: all .3s ease;
      position: relative;
    }

    /* 微光動畫特效 */
    .card::after {
      content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(110, 231, 183, 0.03), transparent);
      transform: rotate(45deg); transition: 0.8s; pointer-events: none;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(52, 211, 153, 0.3);
      box-shadow: 0 30px 70px rgba(0,0,0,.5), 0 0 20px rgba(52, 211, 153, 0.05);
    }
    
    .card:hover::after { left: 100%; top: 100%; }

    .thumb {
      aspect-ratio: 16/9; display: grid; place-items: center;
      background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, .05), transparent), #050a08;
      border-bottom: 1px solid rgba(110, 231, 183, .07);
      padding: 20px; position: relative;
    }

    .thumb svg { width: 100%; height: 100%; max-height: 140px; filter: drop-shadow(0 8px 15px rgba(0,0,0,.5)); }

    .thumb-badge {
      position: absolute; left: 12px; top: 12px; padding: 4px 10px; border-radius: 999px;
      font-size: 11px; background: rgba(6, 95, 70, 0.6); color: #fff; border: 1px solid rgba(110, 231, 183, 0.3);
    }

    .body { padding: 20px; display: grid; gap: 10px; }
    .name { font-size: 24px; font-weight: 800; margin: 0; color: #fff; }
    .desc { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
    
    .tag {
      display: inline-block; padding: 3px 10px; border-radius: 6px;
      background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(110, 231, 183, 0.1);
      font-size: 11px; color: var(--brand); margin-right: 5px;
    }

    .actions {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.04);
      background: rgba(255,255,255, .01);
    }
    .go {
      font-weight: 700; font-size: 14px; color: #fff; display: flex; align-items: center; gap: 8px;
    }
    .go span { color: var(--brand); transition: .2s; }
    .go:hover span { transform: translateX(3px); }

    .result-bar { margin: 12px 2px 0; color: var(--muted); font-size: 13px; }
    .empty { padding: 40px; text-align: center; border: 1px dashed var(--line-strong); border-radius: var(--radius); color: var(--muted); margin-top: 20px; }
  </style>
</head>
<body>

  <div class="wrap">
    <header class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="logo">L</div>
          <div>
            <h1 class="title">AI 實驗室門戶</h1>
            <p class="subtitle">PREMIUM EMERALD EDITION</p>
          </div>
        </div>
        <div class="top-badge">EST. 2026</div>
      </div>

      <div class="toolbar" role="search">
        <label class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
          <input id="searchInput" type="search" placeholder="搜尋項目或標籤..." autocomplete="off" />
        </label>
        <div class="chips" id="chipBar"></div>
      </div>
      <div class="result-bar">目前顯示 <span id="resultCount">0</span> 個實驗模組</div>
    </header>

    <main>
      <section id="cardGrid" class="grid"></section>
      <div id="emptyState" class="empty" hidden>未找到匹配的實驗室項目。</div>
    </main>
  </div>

  <script>
    // 1. 標籤定義
    const TAG_DEFS = [
      { label: '全部', value: 'all' },
      { label: '數據科學', value: 'data' },
      { label: '介面設計', value: 'ui' },
      { label: '自動化', value: 'tool' },
      { label: '生物科技', value: 'bio' }
    ];

    // 2. 綠色調 SVG 圖標定義
    const THUMBNAILS = {
      light: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" opacity="0.9"><path d="M14 6v14M1 15c4 4 8 6 12 6s8-2 12-6M1 28h30M12 31c-2 4-4 8-4 15M21 31c0 8 4 14 18 14" /></g></svg>`,
      plant: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"><path d="M16 6c-2 0-8 2-8 6s8 4 8 10M11 10c0 10-2 22-2 22M22 16c0 4 0 4 1 4s8-2 8-6M27 6c0 10-1 27-1 27" /><path stroke="#4ade80" d="M32 48c0 2 4 4 8 4s8-2 8-8M51 34c0 10-3 14-3 14" /></g></svg>`,
      tool: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#d1fae5" stroke-width="2.5" stroke-linecap="round"><rect x="10" y="10" width="44" height="44" rx="5" /><path d="M20 32h24M32 20v24" /></g></svg>`
    };

    // 3. 核心資料庫
    const DATABASE = [
      {
        name: "光學感測模組",
        desc: "高精度的 UI 光譜分析，探討色彩對用戶行為的深層影響。",
        tags: ["ui", "data"],
        thumbnail: "light",
        url: "#",
        badge: "Core"
      },
      {
        name: "植物生長監測",
        desc: "結合 IOT 數據，即時視覺化生物樣本的環境耐受度。",
        tags: ["bio", "data"],
        thumbnail: "plant",
        url: "#",
        badge: "Live"
      },
      {
        name: "自動化工作流",
        desc: "極簡化 JavaScript 處理邏輯，提升跨平台部署效率。",
        tags: ["tool"],
        thumbnail: "tool",
        url: "#"
      }
    ];

    const searchInput = document.getElementById('searchInput');
    const chipBar = document.getElementById('chipBar');
    const cardGrid = document.getElementById('cardGrid');
    const resultCount = document.getElementById('resultCount');
    const emptyState = document.getElementById('emptyState');

    let currentTag = 'all';

    function initChips() {
      TAG_DEFS.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = tag.label;
        btn.setAttribute('aria-pressed', tag.value === 'all');
        btn.onclick = () => {
          currentTag = tag.value;
          document.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
          btn.setAttribute('aria-pressed', 'true');
          render();
        };
        chipBar.appendChild(btn);
      });
    }

    function render() {
      const keyword = searchInput.value.toLowerCase();
      const filtered = DATABASE.filter(item => {
        const matchTag = (currentTag === 'all' || item.tags.includes(currentTag));
        const matchText = item.name.toLowerCase().includes(keyword) || item.desc.toLowerCase().includes(keyword);
        return matchTag && matchText;
      });

      cardGrid.innerHTML = filtered.map(item => `
        <article class="card">
          <div class="thumb">
            ${THUMBNAILS[item.thumbnail] || ''}
            ${item.badge ? `<span class="thumb-badge">${item.badge}</span>` : ''}
          </div>
          <div class="body">
            <h2 class="name">${item.name}</h2>
            <p class="desc">${item.desc}</p>
            <div class="tags">
              ${item.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
            </div>
          </div>
          <div class="actions">
            <span style="font-size:12px; color:var(--muted)">Ready to explore</span>
            <a href="${item.url}" class="go">探索 <span>→</span></a>
          </div>
        </article>
      `).join('');

      resultCount.textContent = filtered.length;
      emptyState.hidden = filtered.length > 0;
    }

    searchInput.addEventListener('input', render);
    initChips();
    render();
  </script>
</body>
</html>
